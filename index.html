<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本中部家庭旅遊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'morandi-bg': '#F7F4F2',
                        'morandi-red': '#B86F72',
                        'morandi-red-light': '#E8D5D6',
                        'morandi-red-dark': '#8C4F52',
                        'morandi-text': '#5A504E',
                        'morandi-text-light': '#8E8584',
                        'morandi-card': '#FFFFFF',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(184, 111, 114, 0.08)',
                        'inner-soft': 'inset 0 2px 4px rgba(0, 0, 0, 0.02)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #e5e5e5;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E8D5D6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #B86F72; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        textarea { resize: none; }
        textarea:focus {
            outline: none;
            border-color: #B86F72;
            box-shadow: 0 0 0 3px rgba(184, 111, 114, 0.2);
        }
    </style>
</head>
<body class="text-morandi-text min-h-screen flex justify-center relative">

    <!-- Toast 訊息提示 -->

        訊息內容

    <!-- 管理員密碼 Modal -->
    <div id="admin-modal" class="fixed inset-0 z-[120] hidden bg-black/60 flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">

            <h3 class="text-xl font-bold text-morandi-red mb-2">管理員權限</h3>
            <p class="text-sm text-morandi-text-light mb-5">請輸入密碼</p>
            <input type="password" id="admin-pwd-input" class="w-full bg-white border border-morandi-red-light rounded-xl p-3 text-lg text-morandi-text focus:border-morandi-red transition-colors mb-2 text-center tracking-widest outline-none" placeholder="輸入密碼">
            <p id="admin-error-msg" class="text-xs text-red-500 mb-4 hidden">密碼錯誤，請重新嘗試。</p>
            <div class="flex justify-center space-x-3 mt-4">
                <button onclick="closeAdminModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold text-morandi-text-light hover:bg-morandi-red-light/30 transition-colors">取消</button>
                <button onclick="verifyAdmin()" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-morandi-red text-white shadow-sm hover:bg-morandi-red-dark transition-colors">確認解鎖</button>
            </div>
        </div>
    </div>

    <!-- 圖片放大 Modal -->
    <div id="image-modal" class="fixed inset-0 z-[100] hidden bg-black/80 flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <button onclick="closeImageModal()" class="absolute top-6 right-6 text-white hover:text-morandi-red-light p-2 bg-black/50 rounded-full">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="modal-image" src="" class="max-w-full max-h-[80vh] rounded-lg shadow-2xl object-contain" alt="房型照片">
    </div>

    <!-- 編輯用 Modal -->
    <div id="edit-modal" class="fixed inset-0 z-[110] hidden bg-black/60 flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-morandi-bg w-full max-w-sm rounded-2xl p-5 shadow-2xl relative">
            <h3 id="edit-title" class="text-lg font-bold text-morandi-red mb-2">編輯內容</h3>
            <p id="edit-helper-text" class="text-[11px] text-morandi-red-dark mb-3 hidden bg-morandi-red-light/30 p-2.5 rounded-lg leading-relaxed"></p>
            <textarea id="edit-textarea" class="w-full h-40 bg-white border border-morandi-red-light rounded-xl p-3 text-sm text-morandi-text focus:border-morandi-red transition-colors mb-4"></textarea>
            <div class="flex justify-end space-x-3">
                <button onclick="closeEditModal()" class="px-4 py-2 rounded-lg text-sm font-bold text-morandi-text-light hover:bg-morandi-red-light/30">取消</button>
                <button onclick="saveEdit()" class="px-4 py-2 rounded-lg text-sm font-bold bg-morandi-red text-white shadow-sm hover:bg-morandi-red-dark">儲存雲端</button>
            </div>
        </div>
    </div>

    <!-- 應用程式容器 (模擬手機大小) -->

        <!-- 內容由 JS 動態渲染 -->
    </div>

            {

                schedule: [
                    { time: "早上", event: "名古屋城 (名古屋城櫻花節)" },
                    { time: "下午", event: "熱田神宮" },
                    { time: "下午", event: "大須觀音商店街" }
                ],
                restaurant: "早餐：Kato Coffee Sakae (8:00~)\n午餐：harbs\n晚餐：大須觀音或榮商圈周邊",
                hotel: "錦威斯特酒店 (Nishitetsu Hotel Croom)",
                hotelMap: "https://maps.app.goo.gl/vensZNM4TzxvivyYA"
            },
            {
                day: 7, date: "4/17", weekday: "Fri",
                shortTitle: "樂高樂園/名花之里",
                iconSvg: '<circle cx="12" cy="11" r="8"/><circle cx="12" cy="11" r="2"/><path d="M12 11l-3 11M12 11l3 11M7 22h10M12 3v8M12 13v6M4 11h16M6.3 6.3l3.5 3.5M14.2 14.2l3.5 3.5M17.7 6.3l-3.5 3.5M9.8 14.2l-3.5 3.5"/>',
                main: "樂高樂園、名花之里",
                schedule: [
                    { time: "交通", event: "名古屋站買票，地鐵1h > 名古屋站 > 金城埠頭", type: "minor" },
                    { time: "10:00", event: "開門：樂高樂園" },
                    { time: "下午", event: "名花之里 / 德川園 / 刀劍博物館" },
                    { time: "晚上", event: "名古屋站地下街伴手禮" }
                ],
                restaurant: "午餐(11:00)：Grains(素食) 或 麵家獅子丸\n晚餐：周邊或地下街",

                hotelMap: "https://maps.app.goo.gl/vensZNM4TzxvivyYA"
            },
            {
                day: 8, date: "4/18", weekday: "Sat",
                shortTitle: "常滑招財貓",
                iconSvg: '<path d="M12 5c.67 0 1.35.09 2 .26 1.78-2 5.03-2.84 6.42-2.26 1.4.58-.42 7-.42 7 .57 1.07 1 2.24 1 3.44C21 17.9 16.97 21 12 21s-9-3-9-7.56c0-1.25.5-2.4 1.1-3.48 0 0-1.9-6.42-.5-7 1.4-.58 4.5.18 6.28 2.12.7-.2 1.44-.3 2.12-.3Z"/>',
                main: "前往機場飯店",
                schedule: [
                    { time: "早上", event: "40min 久屋大通 > 金山 > 機場", type: "minor" },

                ],
                restaurant: "早餐：飯店或周邊\n午晚餐：機場周邊",
                hotel: "Comfort Hotel 中部國際機場",
                hotelMap: "https://maps.app.goo.gl/3JoSXNtXALKQeK2o7"
            },
            {
                day: 9, date: "4/19", weekday: "Sun",
                shortTitle: "回家嚕",
                iconSvg: '<path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 4-3 3-3.3-.8c-.4-.1-.9.1-1.1.5l-.6.6L4 17l1.7 3 4.3-1 .6-.6c.4-.2.6-.7.5-1.1L10 14l3-3 4 6 1.2-.7c.4-.2.7-.6.6-1.1Z"/>',
                main: "搭機回程",
                schedule: [
                    { time: "6:30-9:00", event: "早餐 (飯店)" },
                    { time: "早上", event: "飯店退房 (CO)" },
                    { time: "10:40-12:45", event: "班機時間，準備回程" }
                ],
                restaurant: "早餐：飯店",
                hotel: "溫暖的家"
            }
        ];

        // 嘗試讀取本地端備份
        const localSavedData = localStorage.getItem('localTripData');
        if (localSavedData) {
            try { tripData = JSON.parse(localSavedData); } catch(e) {}
        }

        // --- 您專屬的 Firebase 雲端初始化設定 ---
        let isCloudEnabled = false;
        let auth, db, appId;

        try {
            const firebaseConfig = {
              apiKey: "AIzaSyBLev7BsDbo3pErlazCh2ixIuhrgI14a6o",
              authDomain: "familytrip-4f7ac.firebaseapp.com",
              projectId: "familytrip-4f7ac",
              storageBucket: "familytrip-4f7ac.firebasestorage.app",
              messagingSenderId: "372741272727",
              appId: "1:372741272727:web:9ce5b3ac7be915eef625d2",
              measurementId: "G-SEMH200HLC"
            };
            
            const firebaseApp = initializeApp(firebaseConfig);
            auth = getAuth(firebaseApp);
            db = getFirestore(firebaseApp);
            appId = 'japan-trip-2026';
            isCloudEnabled = true;
        } catch(error) {
            console.warn("Firebase 初始化失敗，切換為本地模式:", error);
        }

        async function initAuth() {
            if (!isCloudEnabled) return;
            try {
                await signInAnonymously(auth);
            } catch (e) {
                console.error("登入失敗，請確認 Firebase Authentication 的 Anonymous (匿名登入) 是否已在後台啟用！", e);
            }
        }

        if (isCloudEnabled) {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tripInfo', 'main');
                    onSnapshot(docRef, (snapshot) => {
                        if (snapshot.exists()) {
                            const data = snapshot.data();
                            if (data.tripData) tripData = data.tripData;
                            if (data.memo !== undefined) cloudMemo = data.memo;
                        } else {
                            if(isAdmin) saveToCloud();
                        }
                        const isDetailPage = document.getElementById('edit-modal') && !document.getElementById('edit-modal').classList.contains('hidden');
                        if (!isDetailPage && typeof window.renderHome === 'function') {
                            if (document.querySelector('button[onclick="renderHome()"]')) {
                                // 正在內頁
                            } else {
                                window.renderHome();
                            }
                        }
                    }, (error) => console.error("Firestore error:", error));
                }
            });
            initAuth();
        }

        async function saveToCloud() {
            if (!isAdmin) return;
            
            localStorage.setItem('localTripData', JSON.stringify(tripData));
            localStorage.setItem('localMemo', cloudMemo);

            if (isCloudEnabled && auth.currentUser) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'tripInfo', 'main');
                    await setDoc(docRef, { tripData: tripData, memo: cloudMemo }, { merge: true });
                } catch(e) {
                    console.error("寫入雲端失敗，請確認 Firestore 安全規則是否設為測試模式", e);
                }
            }
        }

        // --- UI 輔助功能 ---
        window.showToast = function(msg) {
            const toast = document.getElementById('toast-msg');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            void toast.offsetWidth; 
            toast.classList.remove('opacity-0', 'translate-y-[-20px]');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        };

        window.toggleAdmin = function() {
            if (isAdmin) {
                isAdmin = false;
                localStorage.setItem('tripAdmin', 'false');
                window.showToast("已登出管理員編輯模式，畫面切換為純檢視。");
                window.renderHome();
            } else {
                document.getElementById('admin-pwd-input').value = '';
                document.getElementById('admin-error-msg').classList.add('hidden');
                document.getElementById('admin-modal').classList.remove('hidden');
                document.getElementById('admin-modal').classList.add('flex');
            }
        };

        window.closeAdminModal = function() {
            document.getElementById('admin-modal').classList.add('hidden');
            document.getElementById('admin-modal').classList.remove('flex');
        };

        window.verifyAdmin = function() {
            const pwd = document.getElementById('admin-pwd-input').value;
            if (pwd === "0411") {
                isAdmin = true;
                localStorage.setItem('tripAdmin', 'true');
                window.showToast("🔓 解鎖成功！您可以修改行程內容了。");
                saveToCloud(); 
                window.closeAdminModal();
                window.renderHome();
            } else {
                document.getElementById('admin-error-msg').classList.remove('hidden');
            }
        };

        window.editField = function(dayIndex, field, title) {
            currentEditTarget = { dayIndex, field };
            document.getElementById('edit-title').innerText = "編輯 " + title;
            
            let content = "";
            const helperText = document.getElementById('edit-helper-text');
            
            if (field === 'schedule') {
                content = tripData[dayIndex][field].map(item => {
                    let parts = [item.time, item.event];
                    if (item.type || item.note) parts.push(item.type || '');
                    if (item.note) parts.push(item.note);
                    return parts.join(' | ');
                }).join('\n');

                    tripData[currentEditTarget.dayIndex][currentEditTarget.field] = newSchedule;
